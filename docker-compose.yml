services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelops-postgres
    environment:
      POSTGRES_DB: sentinelops
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sentinelops-network

  redis:
    image: redis:7-alpine
    container_name: sentinelops-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - sentinelops-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sentinelops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - sentinelops-network

volumes:
  postgres-data:

networks:
  sentinelops-network:
    driver: bridge
